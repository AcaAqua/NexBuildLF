name: Build Android debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Make Gradle executable
        run: chmod +x ./gradlew
        working-directory: android

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
        working-directory: android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: kouteikanri-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          archive: false
          if-no-files-found: error
          retention-days: 30

      - name: Prepare release APK
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk release/kouteikanri-debug.apk

      - name: Publish latest debug APK release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: debug-latest
          APK_PATH: release/kouteikanri-debug.apk
        run: |
          NOTES="Debug APK built from ${GITHUB_SHA} on $(date -u +'%Y-%m-%d %H:%M UTC')."
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$APK_PATH" --clobber
            gh release edit "$RELEASE_TAG" --title "工程管理 Pro Debug APK" --notes "$NOTES" --latest
          else
            gh release create "$RELEASE_TAG" "$APK_PATH" --title "工程管理 Pro Debug APK" --notes "$NOTES" --latest
          fi
